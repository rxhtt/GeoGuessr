<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeoGuess India - A Spatial Reasoning Simulation</title>
    <meta name="description" content="A high-fidelity geographic intelligence game. Test your knowledge of India's cities and states through spatial coordinate mapping.">
    
    <!-- Premium Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">

    <!-- Leaflet GIS Infrastructure -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>GeoGuess <span class="accent">India</span></h1>
        <div id="game-stats" class="glass">
            <div class="stat-item">
                <span class="label">ROUND</span>
                <span id="round" class="value">1 / 5</span>
            </div>
            <div class="stat-item">
                <span class="label">TOTAL SCORE</span>
                <span id="score" class="value">0</span>
            </div>
        </div>
    </header>

    <main id="app-container">
        <section id="map-simulation">
            <div id="map"></div>
            <div id="instruction-overlay" class="glass">
                <p id="city-prompt">Initializing coordinates...</p>
            </div>
        </section>

        <section id="controls" class="glass">
            <button id="submitBtn" class="primary-button" disabled>SUBMIT COORDINATES</button>
            <div id="result-display" class="hidden">
                <div class="result-card">
                    <p id="result-city"></p>
                    <p id="result-dist"></p>
                    <p id="result-score" class="accent-score"></p>
                </div>
            </div>
        </section>
    </main>

    <div id="game-over-modal" class="modal hidden">
        <div class="modal-content glass">
            <h2>Simulation Complete</h2>
            <div class="final-score-display">
                <span class="label">Final Intelligence Quotient:</span>
                <span id="final-score" class="value">0</span>
            </div>
            <button id="restartBtn" class="primary-button">RESTART ARCHITECTURE</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
